# Semgrep static analysis for kula.
#
# ─── Security model (identical to ci.yml) ──────────────────────────────────
#   * permissions: contents: read
#       The GITHUB_TOKEN handed to this run can only READ this one repo.
#       Every write scope (contents:write, packages, id-token, ...) is
#       implicitly `none`. So even if a dependency or an installed dev tool
#       turns out to be malicious, it CANNOT push commits, move tags, cut
#       releases, or otherwise manipulate the remote repository.
#   * persist-credentials: false
#       checkout does NOT write the token into .git/config, so nothing
#       running in the job can read it back out in the first place.
#   * No third-party actions.
#       Only first-party actions/* are used, each pinned to a full commit
#       SHA (tags are mutable and can be re-pointed; a SHA cannot).
#   * semgrep is installed from PyPI into a throwaway venv, pinned to the
#       latest release uploaded more than 7 days ago (--uploaded-prior-to=P7D)
#       so a freshly-published malicious version can't sneak in. Within the
#       read-only sandbox above it has no path to the remote repo regardless.
#   * runs-on: ubuntu-latest — a GitHub-hosted, ephemeral VM destroyed
#       after the job. We don't care what happens inside it.
# ───────────────────────────────────────────────────────────────────────────

name: Semgrep

on:
  push:
    branches: [main]
    paths: &code-paths
      - 'cmd/**'
      - 'internal/**'
      - 'config.example.yaml'
      - 'go.mod'
      - 'go.sum'
      - 'version.go'
      - 'VERSION'
      - '.github/workflows/semgrep.yml'
  pull_request:
    paths: *code-paths
  workflow_dispatch:

# Top-level default: read-only, repo-scoped token for every job below.
permissions:
  contents: read

# A newer push to the same ref cancels the older, still-running scan.
concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Assert no credentials persisted in the checkout
        # Belt-and-suspenders on top of persist-credentials:false (token never
        # written) and contents:read (token can't write anyway). Strips any
        # persisted git auth and FAILS the run if any remains — turning "no
        # token on disk" from an assumption into an enforced invariant, before
        # any dependency or tool is fetched, built, or run.
        run: |
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          git config --local --unset-all credential.helper                    2>/dev/null || true
          rm -f "$HOME/.git-credentials"
          if git config --local --list | grep -iE 'extraheader|authorization|x-access-token' >/dev/null 2>&1; then
            echo "::error::Credential material present in .git/config" >&2
            exit 1
          fi
          echo "OK: no credentials persisted in the local checkout."

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install semgrep
        # Install into a throwaway venv, pinned to the latest release that was
        # uploaded to PyPI more than 7 days ago. Named .venv so it matches the
        # .venv/ entry in .semgrepignore (the installed packages must not be
        # scanned as if they were project source).
        run: |
          python -m venv .venv
          .venv/bin/pip install --uploaded-prior-to=P7D semgrep
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Semgrep scan
        run: semgrep scan --error
